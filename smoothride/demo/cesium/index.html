<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SmoothRide — 3D San Francisco</title>
  <link href="https://cesium.com/downloads/cesiumjs/releases/1.123/Build/Cesium/Widgets/widgets.css"
        rel="stylesheet" />
  <script src="https://cesium.com/downloads/cesiumjs/releases/1.123/Build/Cesium/Cesium.js"></script>
  <style>
    html, body, #cesium { margin: 0; padding: 0; width: 100%; height: 100%;
      overflow: hidden; background: #0b0e13; font-family: ui-monospace, monospace; }
    #hud { position: absolute; top: 12px; left: 12px; z-index: 5; color: #e6edf3;
      background: rgba(10,14,20,.72); border: 1px solid #2a3340; border-radius: 10px;
      padding: 12px 14px; font-size: 13px; line-height: 1.5; min-width: 210px;
      backdrop-filter: blur(4px); }
    #hud h1 { font-size: 14px; margin: 0 0 6px; color: #7dd3fc; }
    #hud .row { display: flex; justify-content: space-between; gap: 16px; }
    #hud .k { opacity: .7; } #hud .v { font-weight: 600; }
    .ok { color: #34d399; } .bad { color: #f87171; }
    #err { position: absolute; inset: 0; z-index: 10; display: none;
      align-items: center; justify-content: center; color: #e6edf3; text-align: center; }
    #err .box { max-width: 560px; background: #11161f; border: 1px solid #2a3340;
      border-radius: 12px; padding: 24px 28px; }
    #err code { background: #0b0e13; padding: 2px 6px; border-radius: 4px; color: #7dd3fc; }
    a { color: #7dd3fc; }
  </style>
</head>
<body>
  <div id="cesium"></div>
  <div id="hud">
    <h1>SmoothRide · 3D SF</h1>
    <div class="row"><span class="k">clock</span><span class="v" id="h-clock">—</span></div>
    <div class="row"><span class="k">cars moving</span><span class="v" id="h-moving">—</span></div>
    <div class="row"><span class="k">crashed</span><span class="v" id="h-crash">—</span></div>
    <div class="row"><span class="k">trips done</span><span class="v" id="h-trips">—</span></div>
    <div class="row"><span class="k">valid run</span><span class="v" id="h-valid">—</span></div>
  </div>
  <div id="err"></div>
  <script src="config.js" onerror="window.__noConfig=true"></script>
  <script src="app.js"></script>
</body>
</html>
